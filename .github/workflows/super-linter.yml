name: Lint Code Base

on:
  pull_request:
    # Triggers on all PRs to any branch. 
    # To restrict to a specific branch, add: branches: [ main ]

jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Full git history is required for Super-Linter to detect changed files
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set to false to lint only modified files in the PR
          VALIDATE_ALL_CODEBASE: false 
          # Matches the PR's target branch to correctly identify changes
          DEFAULT_BRANCH: ${{ github.event.pull_request.base.ref }}
